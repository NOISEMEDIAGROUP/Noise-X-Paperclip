name: Build and Deploy Dev

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ai-harness
  DEV_RELEASE_NAME: paperclip-dev
  DEV_NAMESPACE: paperclip-dev

jobs:
  build-and-deploy-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Extract ACR name from login server
        id: acr
        run: |
          # e.g. myregistry.azurecr.io -> myregistry
          LOGIN_SERVER="${{ secrets.ACR_LOGIN_SERVER }}"
          ACR_NAME="${LOGIN_SERVER%%.*}"
          echo "acr_name=${ACR_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Compute image tag dd.mm.yyyy.N
        id: tag
        run: |
          DATE_TAG=$(date +'%d.%m.%Y')
          # Count existing tags for this date in ACR and increment
          EXISTING_COUNT=$(az acr repository show-tags \
            -n "${{ steps.acr.outputs.acr_name }}" \
            --repository "${IMAGE_NAME}" \
            --query "[?starts_with(@, '${DATE_TAG}.')]|length(@)" -o tsv 2>/dev/null || echo 0)
          NEXT=$((EXISTING_COUNT + 1))
          IMAGE_TAG="${DATE_TAG}.${NEXT}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed image tag: ${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:dev-latest

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AZURE_AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AZURE_AKS_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Ensure dev namespace
        run: |
          kubectl get ns "${DEV_NAMESPACE}" >/dev/null 2>&1 || kubectl create ns "${DEV_NAMESPACE}"

      - name: Deploy dev with Helm
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.image_tag }}"

          helm upgrade --install "${DEV_RELEASE_NAME}" ./helm \
            --namespace "${DEV_NAMESPACE}" \
            --set server.image.repository="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}" \
            --set server.image.tag="${IMAGE_TAG}" \
            --set server.image.pullPolicy=IfNotPresent \
            --set server.paperclip.publicUrl="https://dev.ai-harness.com" \
            --set ingress.hosts[0].host="dev.ai-harness.com" \
            --set ingress.tls[0].hosts[0]="dev.ai-harness.com"

