name: Rollback Deploy

on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit hash to rollback to"
        required: true
        type: string

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Rollback to specified commit via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /home/ubuntu/deploy/paperclip-deploy.sh ${{ inputs.commit }}
          script_stop: true
          timeout: 5m

      - name: Confirm rollback
        run: echo "Rollback to commit ${{ inputs.commit }} completed successfully"
