name: Promote Dev to Main

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if dev is ahead of main
        id: check
        run: |
          COMMIT_COUNT=$(git rev-list main..dev --count)
          echo "count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "dev is up to date with main"
            exit 0
          fi

      - name: Generate commit summary
        if: steps.check.outputs.count != '0'
        id: summary
        run: |
          SUMMARY=$(git log main..dev --oneline)
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create PR from dev to main
        if: steps.check.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head dev \
            --title "Promote dev to main" \
            --body "$(cat <<'EOF'
          ## Commits included

          ${{ steps.summary.outputs.commits }}
          EOF
          )"
