name: Deploy Canary (Template)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag"
        required: true
        default: "latest"
      image_repository:
        description: "Image repository (optional, defaults to ghcr.io/<owner>/<repo>)"
        required: false
        default: ""
      namespace:
        description: "Namespace override (optional, defaults to paperclip)"
        required: false
        default: ""
      rollout_name:
        description: "Argo Rollout name"
        required: false
        default: "paperclip"
      kube_context:
        description: "kubectl context name (optional)"
        required: false
        default: ""

jobs:
  deploy-canary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Render canary manifests
        run: |
          image_repo="${{ github.event.inputs.image_repository }}"
          if [ -z "$image_repo" ]; then
            image_repo="ghcr.io/${{ github.repository }}"
          fi
          image_tag="${{ github.event.inputs.image_tag }}"

          namespace_override="${{ github.event.inputs.namespace }}"
          if [ -z "$namespace_override" ]; then
            namespace_override="paperclip"
          fi

          kustomize build deploy/k8s/overlays/canary \
            | sed -E "s|image:[[:space:]]*[^[:space:]]+|image: ${image_repo}:${image_tag}|g" \
            > /tmp/canary-manifests.yaml

          sed -E -i.bak "s|namespace:[[:space:]]*[a-z0-9-]+|namespace: ${namespace_override}|g" /tmp/canary-manifests.yaml

          echo "Resolved image: ${image_repo}:${image_tag}"
          echo "Resolved namespace: ${namespace_override}"
          head -n 160 /tmp/canary-manifests.yaml

      - name: Apply canary resources
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "KUBECONFIG_DATA secret is required"
            exit 1
          fi
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          kube_context="${{ github.event.inputs.kube_context }}"
          if [ -n "$kube_context" ]; then
            kubectl config use-context "$kube_context"
          fi

          kubectl apply -f /tmp/canary-manifests.yaml

      - name: Rollout status
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          kube_context="${{ github.event.inputs.kube_context }}"
          if [ -n "$kube_context" ]; then
            kubectl config use-context "$kube_context"
          fi

          namespace_override="${{ github.event.inputs.namespace }}"
          if [ -z "$namespace_override" ]; then
            namespace_override="paperclip"
          fi

          rollout_name="${{ github.event.inputs.rollout_name }}"
          if [ -z "$rollout_name" ]; then
            rollout_name="paperclip"
          fi

          kubectl argo rollouts get rollout "$rollout_name" -n "$namespace_override" --watch=false || true
