apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: paperclip
  namespace: paperclip
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: paperclip
  namespaceSelector:
    matchNames:
      - paperclip
  endpoints:
    - port: http
      path: /api/metrics
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
      bearerTokenSecret:
        name: paperclip-metrics
        key: token
