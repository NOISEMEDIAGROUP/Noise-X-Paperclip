apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: paperclip
  namespace: paperclip
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: paperclip
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
