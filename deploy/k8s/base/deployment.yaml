apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperclip
  namespace: paperclip
  labels:
    app: paperclip
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: paperclip
  template:
    metadata:
      labels:
        app: paperclip
    spec:
      containers:
        - name: server
          image: ghcr.io/your-org/paperclip:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3100
              name: http
          envFrom:
            - configMapRef:
                name: paperclip-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: database-url
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: better-auth-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
