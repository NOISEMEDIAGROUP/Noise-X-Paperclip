apiVersion: v1
kind: Service
metadata:
  name: paperclip-stable
  namespace: paperclip
  labels:
    app: paperclip
spec:
  selector:
    app: paperclip
  ports:
    - name: http
      port: 80
      targetPort: 3100
---
apiVersion: v1
kind: Service
metadata:
  name: paperclip-canary
  namespace: paperclip
  labels:
    app: paperclip
spec:
  selector:
    app: paperclip
  ports:
    - name: http
      port: 80
      targetPort: 3100
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paperclip
  namespace: paperclip
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: paperclip.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: paperclip-stable
                port:
                  number: 80
