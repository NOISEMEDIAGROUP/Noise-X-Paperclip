apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: paperclip
  namespace: paperclip
spec:
  replicas: 3
  selector:
    matchLabels:
      app: paperclip
  template:
    metadata:
      labels:
        app: paperclip
    spec:
      containers:
        - name: server
          image: ghcr.io/your-org/paperclip:latest
          ports:
            - containerPort: 3100
              name: http
          envFrom:
            - configMapRef:
                name: paperclip-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: database-url
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: paperclip-secrets
                  key: better-auth-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
  strategy:
    canary:
      canaryService: paperclip-canary
      stableService: paperclip-stable
      trafficRouting:
        nginx:
          stableIngress: paperclip
      steps:
        - setWeight: 10
        - pause:
            duration: 5m
        - analysis:
            templates:
              - templateName: paperclip-canary-analysis
        - setWeight: 50
        - pause:
            duration: 10m
        - analysis:
            templates:
              - templateName: paperclip-canary-analysis
        - setWeight: 100
