apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "paperclip.fullname" . }}-test-connection"
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl:latest
      command: ['curl']
      args: ['-sf', 'http://{{ include "paperclip.fullname" . }}:{{ .Values.service.port }}/api/health']
  restartPolicy: Never
